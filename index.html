<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#101418">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="快掃">
  <title>快掃</title>
  <link rel="manifest" href="manifest.webmanifest?v=24">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png?v=24">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png?v=24">
  <link rel="stylesheet" href="styles.css?v=23">
  <script async src="https://docs.opencv.org/4.x/opencv.js" onload="window.onOpenCvLoaded && window.onOpenCvLoaded()"></script>
</head>
<body>
  <main class="app-shell">
    <section class="camera-pane" aria-label="相機畫面">
      <video id="camera" playsinline autoplay muted></video>
      <div class="camera-empty" id="cameraEmpty">
        <strong>快掃</strong>
        <span>開啟相機，連續拍文件或證件</span>
      </div>
      <canvas id="overlay"></canvas>
      <div class="topbar">
        <div>
          <p class="eyebrow">本機 + Gemini</p>
          <h1>文件快掃</h1>
        </div>
        <div class="status-pill" id="cvStatus">載入 OpenCV...</div>
      </div>
    </section>

    <section class="library-pane" id="libraryPane" aria-label="照片預覽區">
      <div class="resize-grip" id="resizeGrip" aria-label="調整預覽區高度" role="separator">
        <span></span>
      </div>
      <div class="library-head">
        <div>
          <p class="eyebrow">背景處理</p>
          <h2>照片 <span id="countText">0</span></h2>
        </div>
        <button id="selectAll" type="button">全選</button>
      </div>
      <div class="actions">
        <button id="shareSelected" type="button">分享全部</button>
        <button id="downloadSelected" type="button">下載</button>
        <button id="clearSelected" type="button">刪除</button>
      </div>
      <div class="strip" id="strip" aria-live="polite">
        <div class="empty-state">拍照後會先顯示進度，完成後才顯示圖片</div>
      </div>
    </section>

    <section class="bottom-controls" aria-label="拍攝控制">
      <div class="capturebar">
        <button class="icon-button" id="openCamera" type="button" title="開啟相機" aria-label="開啟相機">相機</button>
        <button class="shutter" id="capture" type="button" aria-label="拍照"></button>
        <label class="icon-button file-button" title="匯入照片">
          匯入
          <input id="filePicker" type="file" accept="image/*">
        </label>
      </div>
    </section>
  </main>

  <canvas id="sourceCanvas" hidden></canvas>
  <canvas id="resultCanvas" hidden></canvas>
  <div class="image-viewer" id="imageViewer" hidden>
    <img id="viewerImage" alt="">
  </div>

  <template id="scanTemplate">
    <article class="scan-card">
      <label class="check-wrap">
        <input type="checkbox">
        <span></span>
      </label>
      <img alt="掃描結果">
      <div class="progress-card">
        <div class="progress-ring" style="--progress: 0">
          <strong>0%</strong>
        </div>
        <small></small>
      </div>
      <div class="scan-meta">
        <strong></strong>
        <small></small>
      </div>
    </article>
  </template>

  <script src="app.js?v=23"></script>
</body>
</html>
